# 1. 워크플로 전체 이름 (파일당 하나)
name: GitHub Metrics Generation

# 2. 실행 조건 (예: 매일 한국 시간 04:00에 실행)
on:
  workflow_dispatch:
  schedule:
    # UTC 19:00 = KST 04:00
    - cron: '0 19 * * *' 

jobs:
  # 클래식 서머리
  classic_summary:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@v3
        with:
          filename: metrics.classic.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, repositories
          plugin_lines: yes
          plugin_lines_sections: repositories

  # 가장 많이 사용한 언어 통계 생성
  most_used_languages:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@v3
        with:
          filename: metrics.plugin.languages.used.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_limit: 8

# 상세 언어 통계 생성 (인뎁스 분석, bytes-size/percentage 포함)
  recently_used_languages:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@v3
        with:
          filename: metrics.plugin.languages.used-recent.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          user: ${{ github.repository_owner }}
